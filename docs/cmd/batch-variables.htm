<h1>Variables</h1>

<p>To set an environment varialbe, use</p>

<pre>
SET variableName=value
</pre>

<p>No space around the assignment operator "=" is allowed.</p>

<p>To get an environment variable, enclose the variabel name in percentage signs:</p>

<pre>
ECHO %variableName%
</pre>
